# ============================================================
# サーバー設定
# ============================================================
server.port=8080

# ============================================================
# ログ設定
# ============================================================
logging.level.com.example.ejbapi=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Jackson 設定
# ============================================================
# レスポンスJSONをインデント出力 (デバッグ用; 本番では false 推奨)
spring.jackson.serialization.indent-output=true
# null フィールドを出力しない
spring.jackson.default-property-inclusion=non_null

# ============================================================
# 実EJB接続設定 (本番環境で有効化)
# ============================================================
# ejb.server.url=http-remoting://ejb-server:8080
# ejb.username=appuser
# ejb.password=secret
# ejb.app-name=myapp
# ejb.module-name=mymodule
# ejb.bean-name=EjbServiceBean
