<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJB API Client</title>
    <style>
        :root {
            /* ── Dark テーマ (デフォルト) ── */
            --bg-primary:    #1e1e1e;
            --bg-secondary:  #252526;
            --bg-tertiary:   #2d2d2d;
            --bg-input:      #3c3c3c;
            --bg-dark:       #1a1a1a;
            --border-primary:   #252526;
            --border-secondary: #3c3c3c;
            --border-input:     #555;
            --text-primary:   #d4d4d4;
            --text-secondary: #cccccc;
            --text-muted:     #858585;
            --text-string:    #ce9178;
            --text-keyword:   #9cdcfe;
            --accent:         #007acc;
            --accent-hover:   #1177bb;
            --btn-schema-bg:  #4a3f7a;
            --btn-schema-fg:  #c5b8f8;
            --btn-schema-hover: #5a4e8a;
            --btn-send-bg:    #0e639c;
            --btn-send-fg:    #ffffff;
            --btn-send-hover: #1177bb;
            --btn-danger-bg:  #6e2020;
            --btn-danger-fg:  #f8b8b8;
            --btn-danger-hover: #8a2e2e;
            --status-ok:      #388a34;
            --status-error:   #c72e0f;
            --status-loading: #5f5f5f;
            --c-ok:    #4ec9b0;
            --c-err:   #f44747;
            --c-info:  #9cdcfe;
            --c-warn:  #ce9178;
            --tab-active-bg:  #1e1e1e;
            --tab-dot:        #e8c070;
            --log-bg:         #1a1a1a;
            --line-num-bg:    #2a2a2a;
            --line-num-fg:    #5a5a5a;
            --title-bar-bg:   #323233;
            --scrollbar-thumb: #424242;
            --scrollbar-track: transparent;
        }

        body.light-theme {
            --bg-primary:    #ffffff;
            --bg-secondary:  #f3f3f3;
            --bg-tertiary:   #ececec;
            --bg-input:      #ffffff;
            --bg-dark:       #f7f7f7;
            --border-primary:   #e0e0e0;
            --border-secondary: #d4d4d4;
            --border-input:     #c0c0c0;
            --text-primary:   #1e1e1e;
            --text-secondary: #333333;
            --text-muted:     #888888;
            --text-string:    #a31515;
            --text-keyword:   #0451a5;
            --accent:         #007acc;
            --accent-hover:   #005a9e;
            --btn-schema-bg:  #e8e0f8;
            --btn-schema-fg:  #4a3f7a;
            --btn-schema-hover: #d8cef0;
            --btn-send-bg:    #007acc;
            --btn-send-fg:    #ffffff;
            --btn-send-hover: #005a9e;
            --btn-danger-bg:  #f8d0d0;
            --btn-danger-fg:  #a02020;
            --btn-danger-hover: #f0b0b0;
            --status-ok:      #388a34;
            --status-error:   #c72e0f;
            --status-loading: #aaaaaa;
            --c-ok:    #267f6e;
            --c-err:   #c72e0f;
            --c-info:  #0451a5;
            --c-warn:  #a31515;
            --tab-active-bg:  #ffffff;
            --tab-dot:        #c08000;
            --log-bg:         #f7f7f7;
            --line-num-bg:    #f0f0f0;
            --line-num-fg:    #999999;
            --title-bar-bg:   #dddddd;
            --scrollbar-thumb: #c0c0c0;
            --scrollbar-track: transparent;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', Consolas, 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── スクロールバー ───────────────────── */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

        /* ── タイトルバー ─────────────────────── */
        .title-bar {
            background: var(--title-bar-bg);
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-primary);
            user-select: none;
        }
        .title-bar .app-icon { color: #75beff; font-size: 14px; }
        .title-bar .app-name { font-weight: 600; }
        .title-bar .app-sub  { color: var(--text-muted); font-size: 11px; }
        .title-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

        /* テーマ切替ボタン */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-input);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .theme-toggle:hover { background: var(--bg-input); }
        .theme-toggle .theme-label { font-size: 10px; }

        /* ── ツールバー ───────────────────────── */
        .toolbar {
            background: var(--bg-secondary);
            padding: 7px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-secondary);
            flex-wrap: wrap;
        }
        .toolbar-label {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: #4a4a4a;
            flex-shrink: 0;
            margin: 0 4px;
        }

        /* DTO検索テキストボックス */
        .dto-search {
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 3px;
            outline: none;
            width: 140px;
            font-family: Consolas, 'Courier New', monospace;
        }
        .dto-search:focus { border-color: var(--accent); }
        .dto-search::placeholder { color: var(--text-muted); }

        .dto-select {
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-keyword);
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            min-width: 180px;
            font-family: Consolas, 'Courier New', monospace;
        }
        .dto-select:focus { border-color: var(--accent); }

        .btn {
            border: none;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn-schema {
            background: var(--btn-schema-bg);
            color: var(--btn-schema-fg);
        }
        .btn-schema:hover:not(:disabled) { background: var(--btn-schema-hover); }

        .btn-request {
            background: var(--btn-send-bg);
            color: var(--btn-send-fg);
        }
        .btn-request:hover:not(:disabled) { background: var(--btn-send-hover); }

        .btn-clear {
            background: var(--btn-danger-bg);
            color: var(--btn-danger-fg);
        }
        .btn-clear:hover:not(:disabled) { background: var(--btn-danger-hover); }

        .btn-evidence {
            background: #1a4a2e;
            color: #7ec89a;
            border: 1px solid #2a6e42;
        }
        .btn-evidence:hover:not(:disabled) { background: #245e3a; }
        .evidence-title-input {
            height: 28px;
            padding: 0 8px;
            font-size: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid #2a6e42;
            border-radius: 4px;
            width: 160px;
            outline: none;
        }
        .evidence-title-input:focus { border-color: var(--accent); }

        .btn-add-tab {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-input);
        }
        .btn-add-tab:hover { background: var(--bg-tertiary); }

        .btn:disabled {
            background: var(--bg-input);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .kbd-hint {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            border: 1px solid var(--border-input);
            border-radius: 3px;
            padding: 1px 5px;
            font-family: Consolas, monospace;
        }

        /* ── リクエストタブバー ──────────────── */
        .request-tabs-bar {
            background: var(--bg-tertiary);
            display: flex;
            align-items: stretch;
            height: 32px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-primary);
            overflow-x: auto;
            overflow-y: hidden;
        }
        .request-tabs-bar::-webkit-scrollbar { height: 3px; }

        .req-tab {
            padding: 0 12px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            white-space: nowrap;
            border-right: 1px solid var(--border-primary);
            user-select: none;
            position: relative;
            flex-shrink: 0;
        }
        .req-tab:hover { color: var(--text-secondary); }
        .req-tab.active {
            background: var(--tab-active-bg);
            color: var(--text-secondary);
            border-top: 2px solid var(--accent);
        }
        .tab-check {
            accent-color: var(--accent);
            cursor: pointer;
            width: 12px;
            height: 12px;
            flex-shrink: 0;
        }

        .tab-title { cursor: default; user-select: none; }
        .tab-rename-input {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--accent);
            border-radius: 3px;
            font-size: 12px;
            padding: 1px 4px;
            width: 120px;
            outline: none;
        }
        .tab-copy {
            font-size: 13px;
            line-height: 1;
            padding: 1px 3px;
            border-radius: 3px;
            cursor: pointer;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .tab-copy:hover { opacity: 1; color: var(--accent); background: rgba(0,122,204,0.15); }
        .req-tab.tab-dragging { opacity: 0.4; }
        .req-tab.tab-drag-over { border-left: 2px solid var(--accent); }
        .editors-row { display: flex; flex: 1; overflow: hidden; }
        .tab-memo-bar {
            flex-shrink: 0;
            padding: 4px 8px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }
        .tab-memo {
            width: 100%;
            height: 44px;
            resize: vertical;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-input);
            border-radius: 3px;
            font-size: 12px;
            padding: 4px 8px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }
        .tab-memo:focus { border-color: var(--accent); }
        .evidence-comment-input {
            height: 28px;
            padding: 0 8px;
            font-size: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid #2a6e42;
            border-radius: 4px;
            width: 200px;
            outline: none;
        }
        .evidence-comment-input:focus { border-color: var(--accent); }

        /* ── 抽出リスト ─────────────────────────── */
        .btn-extract-toggle { background: #3a3a5c; border-color: #5b5b9a; color: #b0b0ff; }
        .btn-extract-toggle:hover { background: #4a4a7a; }
        .light-theme .btn-extract-toggle { background: #e8e8ff; border-color: #8888cc; color: #4444aa; }
        .light-theme .btn-extract-toggle:hover { background: #d0d0ff; }
        .extraction-arrow { font-size: 10px; margin-left: 2px; transition: transform 0.2s; display: inline-block; }
        .extraction-arrow.open { transform: rotate(180deg); }

        .extraction-panel {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px 8px;
            flex-shrink: 0;
        }
        .extraction-inner { display: flex; flex-direction: column; gap: 6px; }
        .extraction-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
        }
        .extraction-table thead th {
            text-align: left;
            padding: 3px 8px;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: normal;
            border-bottom: 1px solid var(--border);
        }
        .ex-th-key { width: 200px; }
        .ex-th-val { }
        .ex-th-act { width: 110px; }
        .extraction-table tbody tr:hover { background: rgba(128,128,255,0.05); }
        .ex-td { padding: 3px 4px; vertical-align: middle; }
        .ex-input-key, .ex-input-val {
            width: 100%;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-input);
            border-radius: 3px;
            padding: 3px 7px;
            font-size: 12px;
            font-family: 'Cascadia Code', Consolas, monospace;
            outline: none;
            box-sizing: border-box;
        }
        .ex-input-key { width: 192px; }
        .ex-input-key:focus, .ex-input-val:focus { border-color: var(--accent); }
        .ex-input-val { background: var(--bg-input); color: var(--c-info); }
        .ex-actions { display: flex; gap: 4px; align-items: center; }
        .btn-ex-extract {
            padding: 3px 10px; font-size: 11px;
            background: #1e5a2a; border: 1px solid #2e7a3a; color: #7fffaf;
            border-radius: 3px; cursor: pointer; white-space: nowrap;
        }
        .btn-ex-extract:hover { background: #2a7a38; }
        .light-theme .btn-ex-extract { background: #d4f0dc; border-color: #5aaa6a; color: #1a6a2a; }
        .light-theme .btn-ex-extract:hover { background: #bce8ca; }
        .btn-ex-del {
            padding: 3px 7px; font-size: 12px;
            background: transparent; border: 1px solid transparent;
            color: var(--text-secondary); border-radius: 3px; cursor: pointer;
        }
        .btn-ex-del:hover { background: rgba(255,50,50,0.15); color: var(--c-err); border-color: var(--c-err); }
        .extraction-footer { display: flex; align-items: center; gap: 12px; margin-top: 2px; }
        .btn-ex-add {
            padding: 3px 12px; font-size: 12px;
            background: transparent; border: 1px solid var(--border-input);
            color: var(--text-secondary); border-radius: 3px; cursor: pointer;
        }
        .btn-ex-add:hover { border-color: var(--accent); color: var(--text-primary); }
        .extraction-hint { font-size: 11px; color: var(--text-secondary); opacity: 0.7; }

        .req-tab .tab-close {
            font-size: 14px;
            line-height: 1;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 2px;
            border-radius: 3px;
        }
        .req-tab .tab-close:hover { background: rgba(255,0,0,0.2); color: var(--c-err); }

        .add-tab-btn {
            padding: 0 10px;
            font-size: 16px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            user-select: none;
        }
        .add-tab-btn:hover { color: var(--text-secondary); background: var(--bg-input); }

        /* ── エディター領域 ────────────────────── */
        .editors-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }
        .editor-panel + .editor-panel {
            border-left: 2px solid var(--border-primary);
        }

        /* パネルヘッダー */
        .panel-header {
            background: var(--bg-secondary);
            height: 28px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-secondary);
        }

        /* サブタブ (JSON / toString / Log) */
        .sub-tabs {
            background: var(--bg-tertiary);
            height: 28px;
            display: flex;
            align-items: stretch;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-primary);
        }
        .sub-tab {
            padding: 0 14px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
            border-right: 1px solid var(--border-primary);
        }
        .sub-tab:hover { color: var(--text-secondary); }
        .sub-tab.active {
            background: var(--tab-active-bg);
            color: var(--text-secondary);
            border-top: 1px solid var(--accent);
        }
        .sub-tab .meta-tag {
            font-size: 10px;
            font-family: Consolas, monospace;
            color: var(--c-info);
        }

        /* エディター本体 */
        .editor-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sub-content {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .sub-content.active {
            display: flex;
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* ── 行番号付きテキストエリア ───────────── */
        .lined-content {
            flex: 1;
            overflow: auto;
            background: var(--bg-dark);
            font-family: Consolas, 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .lined-content table {
            border-collapse: collapse;
            width: 100%;
        }
        .lined-content td {
            vertical-align: top;
            padding: 0;
        }
        .lined-content .line-num {
            width: 40px;
            min-width: 40px;
            text-align: right;
            padding: 0 8px 0 4px;
            color: var(--line-num-fg);
            background: var(--line-num-bg);
            user-select: none;
            font-size: 11px;
            border-right: 1px solid var(--border-secondary);
        }
        .lined-content .line-text {
            padding: 0 10px;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-string);
        }
        .lined-content.log-content .line-text {
            color: var(--text-primary);
        }
        .lined-content .placeholder-row .line-text {
            color: var(--text-muted);
        }

        /* ── ステータスバー ────────────────────── */
        .status-bar {
            background: var(--accent);
            color: #ffffff;
            font-size: 11px;
            height: 22px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            font-family: Consolas, monospace;
            transition: background 0.2s;
        }
        .status-bar.s-error   { background: var(--status-error); }
        .status-bar.s-success { background: var(--status-ok); }
        .status-bar.s-loading { background: var(--status-loading); }

        /* スピナー */
        .spinner {
            display: inline-block;
            width: 9px; height: 9px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ─── タイトルバー ─────────────────────────────── -->
<div class="title-bar">
    <span class="app-icon">&#x2b21;</span>
    <span class="app-name">EJB API Client</span>
    <span class="app-sub">— Spring Boot</span>
    <div class="title-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="テーマ切替">
            <span id="themeIcon">&#9790;</span>
            <span class="theme-label" id="themeLabel">Dark</span>
        </button>
    </div>
</div>

<!-- ─── ツールバー ───────────────────────────────── -->
<div class="toolbar">
    <span class="toolbar-label">DTO:</span>

    <input id="dtoSearch" class="dto-search" type="text"
           placeholder="&#x1F50D; 検索..." oninput="filterDtoList()">

    <select id="dtoSelect" class="dto-select">
        <option value="">-- loading... --</option>
    </select>

    <button id="schemaBtn" class="btn btn-schema" onclick="loadDtoSchemaToActiveTab()">
        <span>&#x27a1;</span>
        <span>DTO to JSON</span>
    </button>

    <div class="toolbar-sep"></div>

    <button id="requestBtn" class="btn btn-request" onclick="sendRequestFromActiveTab()">
        <span>&#9654;</span>
        <span>Send</span>
    </button>

    <span class="kbd-hint">Ctrl+Enter</span>

    <div class="toolbar-sep"></div>

    <button class="btn btn-clear" onclick="clearActiveTab()">
        <span>&#x2715;</span>
        <span>Clear</span>
    </button>

    <div class="toolbar-sep"></div>

    <input type="text" id="evidenceTitle" class="evidence-title-input" value="テストエビデンス" placeholder="エビデンスタイトル" title="エビデンスのタイトル">
    <input type="text" id="evidenceComment" class="evidence-comment-input" placeholder="全体コメント（任意）" title="エビデンス全体コメント（入力時のみ出力）">
    <button class="btn btn-evidence" onclick="exportEvidence()" title="全タブのrequest/responseをHTMLファイルとして出力">
        <span>&#128196;</span>
        <span>エビデンス出力</span>
    </button>

    <div class="toolbar-sep"></div>

    <button class="btn btn-extract-toggle" onclick="toggleExtractionPanel()" title="抽出リストを表示/非表示">
        <span>&#x1F4CB;</span>
        <span>抽出リスト</span>
        <span id="extractionToggleArrow" class="extraction-arrow">&#x25BC;</span>
    </button>
</div>

<!-- ─── 抽出パネル ──────────────────────────────── -->
<div id="extractionPanel" class="extraction-panel" style="display:none">
    <div class="extraction-inner">
        <table class="extraction-table">
            <thead>
                <tr>
                    <th class="ex-th-key">Key（フィールド名）</th>
                    <th class="ex-th-val">Value（抽出値）</th>
                    <th class="ex-th-act"></th>
                </tr>
            </thead>
            <tbody id="extractionRows"></tbody>
        </table>
        <div class="extraction-footer">
            <button class="btn btn-ex-add" onclick="addExtractionRow()">＋ 行追加</button>
            <span class="extraction-hint">アクティブタブの Request / Response JSON からフィールド値を抽出します</span>
        </div>
    </div>
</div>

<!-- ─── リクエストI/F タブバー ───────────────────── -->
<div class="request-tabs-bar" id="requestTabsBar">
    <!-- 動的に生成 -->
    <div class="add-tab-btn" onclick="addNewTab()" title="タブを追加">+</div>
</div>

<!-- ─── エディター ───────────────────────────────── -->
<div class="editors-area" id="editorsArea">
    <!-- 動的に生成される -->
</div>

<!-- ─── ステータスバー ──────────────────────────── -->
<div id="statusBar" class="status-bar">
    <span>&#10003; Ready</span>
    <span>EJB API Demo</span>
</div>

<!-- ─── Monaco Editor (CDN) ────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
    /* ── グローバル状態 ─────────────────────────── */
    let monacoReady = false;
    let allDtoList = [];              // 全DTO名リスト
    let tabCounter = 0;               // タブ連番
    let tabs = [];                    // { id, number, dtoName, inputEditor, outputEditor, logs }
    let activeTabId = null;

    /* ── テーマ切替 ─────────────────────────────── */
    function toggleTheme() {
        const body = document.body;
        const isDark = !body.classList.contains('light-theme');
        body.classList.toggle('light-theme', isDark);
        document.getElementById('themeIcon').innerHTML = isDark ? '&#9728;' : '&#9790;';
        document.getElementById('themeLabel').textContent = isDark ? 'Light' : 'Dark';

        // Monaco テーマ変更
        if (monacoReady) {
            const theme = isDark ? 'vs' : 'vs-dark';
            monaco.editor.setTheme(theme);
        }

        localStorage.setItem('ejb-theme', isDark ? 'light' : 'dark');
    }

    function applyStoredTheme() {
        const stored = localStorage.getItem('ejb-theme');
        if (stored === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('themeIcon').innerHTML = '&#9728;';
            document.getElementById('themeLabel').textContent = 'Light';
        }
    }
    applyStoredTheme();

    /* ── DTO 一覧取得 & フィルタ ──────────────── */
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const res  = await fetch('/api/dto/list');
            allDtoList = await res.json();
            populateDtoSelect(allDtoList);
        } catch (e) {
            document.getElementById('dtoSelect').innerHTML =
                '<option value="">（取得エラー）</option>';
        }
    });

    function populateDtoSelect(list) {
        const sel = document.getElementById('dtoSelect');
        sel.innerHTML = '';
        if (list.length === 0) {
            sel.innerHTML = '<option value="">（該当なし）</option>';
        } else {
            list.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
        }
    }

    function filterDtoList() {
        const q = document.getElementById('dtoSearch').value.toLowerCase();
        const filtered = allDtoList.filter(n => n.toLowerCase().includes(q));
        populateDtoSelect(filtered);
    }

    /* ── 行番号付きテキスト生成 ──────────────── */
    function renderLinedText(text, cssClass) {
        if (!text || text.trim() === '') {
            return `<div class="lined-content ${cssClass || ''}">
                <table><tr class="placeholder-row">
                    <td class="line-num">1</td>
                    <td class="line-text">// (empty)</td>
                </tr></table></div>`;
        }
        const lines = text.split('\n');
        const rows = lines.map((line, i) =>
            `<tr><td class="line-num">${i + 1}</td><td class="line-text">${escapeHtml(line)}</td></tr>`
        ).join('');
        return `<div class="lined-content ${cssClass || ''}"><table>${rows}</table></div>`;
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* ── タブ管理 ────────────────────────────── */
    function addNewTab(dtoName) {
        tabCounter++;
        const id = 'tab-' + tabCounter;
        const tab = {
            id,
            number: tabCounter,
            dtoName: dtoName || 'New',
            label: null,
            memo: '',
            inputEditor: null,
            outputEditor: null,
            logs: [],
            reqSubTab: 'json',
            resSubTab: 'json',
            selected: true
        };
        tabs.push(tab);
        renderTabs();
        switchTab(id);
        return tab;
    }

    function removeTab(id, event) {
        if (event) event.stopPropagation();
        if (tabs.length <= 1) return; // 最低1タブは残す

        const idx = tabs.findIndex(t => t.id === id);
        const tab = tabs[idx];

        // エディター破棄
        if (tab.inputEditor) tab.inputEditor.dispose();
        if (tab.outputEditor) tab.outputEditor.dispose();

        tabs.splice(idx, 1);

        if (activeTabId === id) {
            const newIdx = Math.min(idx, tabs.length - 1);
            activeTabId = null;
            renderTabs();
            switchTab(tabs[newIdx].id);
        } else {
            renderTabs();
        }
    }

    function renderTabs() {
        const bar = document.getElementById('requestTabsBar');
        const addBtn = bar.querySelector('.add-tab-btn');

        // 既存タブ要素を削除
        bar.querySelectorAll('.req-tab').forEach(el => el.remove());

        // タブ要素を生成
        tabs.forEach(tab => {
            const el = document.createElement('div');
            el.className = 'req-tab' + (tab.id === activeTabId ? ' active' : '');
            el.draggable = true;
            el.dataset.tabId = tab.id;
            el.onclick = () => switchTab(tab.id);
            el.addEventListener('dragstart', onTabDragStart);
            el.addEventListener('dragover',  onTabDragOver);
            el.addEventListener('dragleave', onTabDragLeave);
            el.addEventListener('drop',      onTabDrop);
            el.addEventListener('dragend',   onTabDragEnd);

            const displayName = tab.label || `#${tab.number} ${tab.dtoName}`;
            el.innerHTML = `
                <input type="checkbox" class="tab-check" ${tab.selected !== false ? 'checked' : ''}
                       onclick="toggleTabSelect('${tab.id}', event)" title="エビデンス出力対象">
                <span class="tab-title" ondblclick="startRenameTab('${tab.id}', event)"
                      title="ダブルクリックで名前変更">${escapeHtml(displayName)}</span>
                <span class="tab-copy" onclick="copyTab('${tab.id}', event)" title="タブをコピー">&#x2398;</span>
                ${tabs.length > 1
                    ? `<span class="tab-close" onclick="removeTab('${tab.id}', event)" title="閉じる">&times;</span>`
                    : ''}
            `;
            bar.insertBefore(el, addBtn);
        });
    }

    function switchTab(id) {
        if (activeTabId === id) return;

        // 既存エディターのDOM要素を非表示
        const area = document.getElementById('editorsArea');

        // 全タブコンテンツを非表示
        area.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');

        activeTabId = id;
        renderTabs();

        const tab = tabs.find(t => t.id === id);
        let contentEl = document.getElementById('content-' + id);

        if (!contentEl) {
            // 初回: コンテンツ生成
            contentEl = createTabContent(tab);
            area.appendChild(contentEl);

            // Monaco エディター生成
            if (monacoReady) {
                initTabEditors(tab);
            }
        }

        contentEl.style.display = 'flex';
    }

    function createTabContent(tab) {
        const div = document.createElement('div');
        div.id = 'content-' + tab.id;
        div.className = 'tab-content';
        div.style.display = 'none';
        div.style.flex = '1';
        div.style.overflow = 'hidden';
        div.style.flexDirection = 'column';

        div.innerHTML = `
        <div class="editors-row">
            <!-- Request パネル -->
            <div class="editor-panel">
                <div class="panel-header">
                    <span>&#9654; Request</span>
                </div>
                <div class="sub-tabs">
                    <div class="sub-tab active" data-side="req" data-sub="json"
                         onclick="switchSubTab('${tab.id}', 'req', 'json')">
                        JSON
                        <span class="meta-tag" id="reqLines-${tab.id}"></span>
                        <span class="meta-tag" id="reqBytes-${tab.id}"></span>
                    </div>
                    <div class="sub-tab" data-side="req" data-sub="tostring"
                         onclick="switchSubTab('${tab.id}', 'req', 'tostring')">
                        toString
                        <span class="meta-tag" id="reqTsLines-${tab.id}"></span>
                    </div>
                    <div class="sub-tab" data-side="req" data-sub="log"
                         onclick="switchSubTab('${tab.id}', 'req', 'log')">
                        Log
                        <span class="meta-tag" id="reqLogCount-${tab.id}"></span>
                    </div>
                </div>
                <div class="editor-body">
                    <div class="sub-content active" id="reqJson-${tab.id}">
                        <div id="reqEditor-${tab.id}" class="editor-wrapper"></div>
                    </div>
                    <div class="sub-content" id="reqTostring-${tab.id}">
                        <div id="reqTsContent-${tab.id}">
                            ${renderLinedText('// DTO to JSON または Send を実行してください')}
                        </div>
                    </div>
                    <div class="sub-content" id="reqLog-${tab.id}">
                        <div id="reqLogContent-${tab.id}">
                            ${renderLinedText('// ログなし', 'log-content')}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Response パネル -->
            <div class="editor-panel">
                <div class="panel-header">
                    <span>&#9664; Response</span>
                    <span style="margin-left:auto; display:flex; gap:12px;">
                        <span class="meta-tag" id="respHttpStatus-${tab.id}" style="color:var(--c-info)"></span>
                        <span class="meta-tag" id="respTime-${tab.id}" style="color:var(--c-info)"></span>
                    </span>
                </div>
                <div class="sub-tabs">
                    <div class="sub-tab active" data-side="res" data-sub="json"
                         onclick="switchSubTab('${tab.id}', 'res', 'json')">
                        JSON
                        <span class="meta-tag" id="resLines-${tab.id}"></span>
                    </div>
                    <div class="sub-tab" data-side="res" data-sub="tostring"
                         onclick="switchSubTab('${tab.id}', 'res', 'tostring')">
                        toString
                        <span class="meta-tag" id="resTosLines-${tab.id}"></span>
                    </div>
                    <div class="sub-tab" data-side="res" data-sub="log"
                         onclick="switchSubTab('${tab.id}', 'res', 'log')">
                        Log
                        <span class="meta-tag" id="resLogCount-${tab.id}"></span>
                    </div>
                </div>
                <div class="editor-body">
                    <div class="sub-content active" id="resJson-${tab.id}">
                        <div id="resEditor-${tab.id}" class="editor-wrapper"></div>
                    </div>
                    <div class="sub-content" id="resTostring-${tab.id}">
                        <div id="resTosContent-${tab.id}">
                            ${renderLinedText('// Send を実行してください')}
                        </div>
                    </div>
                    <div class="sub-content" id="resLog-${tab.id}">
                        <div id="resLogContent-${tab.id}">
                            ${renderLinedText('// ログなし', 'log-content')}
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-memo-bar">
            <textarea class="tab-memo" placeholder="メモ（テスト観点・期待値など）入力するとエビデンスに出力されます"
                      oninput="saveTabMemo('${tab.id}', this.value)">${escapeHtml(tab.memo || '')}</textarea>
        </div>
        `;

        return div;
    }

    function switchSubTab(tabId, side, sub) {
        const contentEl = document.getElementById('content-' + tabId);
        const prefix = side === 'req' ? 'req' : 'res';

        // サブタブのアクティブ切替
        contentEl.querySelectorAll(`.sub-tab[data-side="${side}"]`).forEach(el => {
            el.classList.toggle('active', el.dataset.sub === sub);
        });

        // コンテンツ切替
        const panels = {
            json: document.getElementById(`${prefix}Json-${tabId}`) || document.getElementById(`${prefix === 'res' ? 'res' : 'req'}Json-${tabId}`),
            tostring: document.getElementById(`${prefix}Tostring-${tabId}`) || document.getElementById(`${prefix === 'res' ? 'res' : 'req'}Tostring-${tabId}`),
            log: document.getElementById(`${prefix}Log-${tabId}`) || document.getElementById(`${prefix === 'res' ? 'res' : 'req'}Log-${tabId}`)
        };

        Object.entries(panels).forEach(([key, el]) => {
            if (el) el.classList.toggle('active', key === sub);
        });

        // Monaco エディターのレイアウト再計算
        const tab = tabs.find(t => t.id === tabId);
        if (tab && sub === 'json') {
            setTimeout(() => {
                if (side === 'req' && tab.inputEditor) tab.inputEditor.layout();
                if (side === 'res' && tab.outputEditor) tab.outputEditor.layout();
            }, 10);
        }

        // 状態保存
        if (side === 'req') {
            tab.reqSubTab = sub;
        } else {
            tab.resSubTab = sub;
        }
    }

    /* ── Monaco 初期化 ─────────────────────────── */
    require.config({
        paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }
    });

    require(['vs/editor/editor.main'], function () {
        monacoReady = true;

        // テーマ設定
        const isLight = document.body.classList.contains('light-theme');
        if (isLight) monaco.editor.setTheme('vs');

        // 既存タブにエディター割当
        tabs.forEach(tab => {
            if (!tab.inputEditor) initTabEditors(tab);
        });
    });

    function getEditorOpts(readOnly) {
        return {
            language: 'json',
            theme: document.body.classList.contains('light-theme') ? 'vs' : 'vs-dark',
            automaticLayout: true,
            fontSize: 13,
            lineHeight: 20,
            fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
            fontLigatures: true,
            minimap: { enabled: false },
            scrollBeyondLastLine: false,
            tabSize: 2,
            renderWhitespace: 'boundary',
            scrollbar: { verticalScrollbarSize: 8, horizontalScrollbarSize: 8 },
            readOnly: !!readOnly,
            lineNumbers: 'on',
            formatOnPaste: !readOnly,
            formatOnType: !readOnly
        };
    }

    function initTabEditors(tab) {
        const defaultRequest = JSON.stringify({
            operationType: "getCustomer",
            data: {
                customerId:    "C001",
                includeOrders: true
            }
        }, null, 2);

        // Request Editor
        const reqEl = document.getElementById('reqEditor-' + tab.id);
        if (reqEl) {
            tab.inputEditor = monaco.editor.create(reqEl, {
                ...getEditorOpts(false),
                value: tab._copyReqJson != null ? tab._copyReqJson : defaultRequest
            });

            // 入力メタ情報更新
            const updateReqMeta = () => {
                const v = tab.inputEditor.getValue();
                const lines = v.split('\n').length;
                const bytes = new TextEncoder().encode(v).length;
                const linesEl = document.getElementById('reqLines-' + tab.id);
                const bytesEl = document.getElementById('reqBytes-' + tab.id);
                if (linesEl) linesEl.textContent = lines + ' lines';
                if (bytesEl) bytesEl.textContent = fmtBytes(bytes);
            };
            tab.inputEditor.onDidChangeModelContent(updateReqMeta);
            updateReqMeta();

            // Ctrl+Enter
            tab.inputEditor.addCommand(
                monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,
                () => sendRequestFromActiveTab()
            );
        }

        // Response Editor
        const resEl = document.getElementById('resEditor-' + tab.id);
        if (resEl) {
            tab.outputEditor = monaco.editor.create(resEl, {
                ...getEditorOpts(true),
                value: tab._copyResJson || '// Send ボタンを押してください (Ctrl+Enter)'
            });
        }
    }

    /* ── DTO → JSON (アクティブタブに適用) ────── */
    async function loadDtoSchemaToActiveTab() {
        const sel = document.getElementById('dtoSelect');
        const className = sel.value;
        if (!className) return;

        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab) return;

        const btn = document.getElementById('schemaBtn');
        btn.disabled = true;
        setStatus('loading', className + ' をロード中…');

        try {
            const res  = await fetch('/api/dto/schema/' + encodeURIComponent(className));
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            if (tab.inputEditor) {
                tab.inputEditor.setValue(JSON.stringify(data.json, null, 2));
            }

            // toString 更新
            const tsContent = document.getElementById('reqTsContent-' + tab.id);
            if (tsContent) {
                tsContent.innerHTML = renderLinedText(data.toStringValue || '');
                updateSubTabMeta(tab.id, 'req', 'tostring', data.toStringValue || '');
            }

            // タブ名更新
            tab.dtoName = className;
            renderTabs();

            // ログ追加
            addLog(tab, 'req', `[DTO to JSON] ${className} loaded`);

            setStatus('', className + ' のスキーマを表示しました');
        } catch (e) {
            addLog(tab, 'req', `[ERROR] DTOロードエラー: ${e.message}`);
            setStatus('error', 'DTOロードエラー: ' + e.message);
        } finally {
            btn.disabled = false;
        }
    }

    /* ── Send Request (アクティブタブ) ─────────── */
    async function sendRequestFromActiveTab() {
        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab || !tab.inputEditor) return;

        const btn            = document.getElementById('requestBtn');
        const respHttpStatus = document.getElementById('respHttpStatus-' + tab.id);
        const respTime       = document.getElementById('respTime-' + tab.id);

        /* JSON バリデーション */
        let body;
        try {
            body = JSON.parse(tab.inputEditor.getValue());
        } catch (e) {
            setStatus('error', 'JSON Parse Error: ' + e.message);
            if (tab.outputEditor) {
                tab.outputEditor.setValue(JSON.stringify({
                    error:   'Invalid JSON',
                    message: e.message
                }, null, 2));
            }
            if (respHttpStatus) {
                respHttpStatus.textContent = 'JSON Error';
                respHttpStatus.style.color = 'var(--c-err)';
            }
            if (respTime) respTime.textContent = '';
            addLog(tab, 'req', `[ERROR] JSON Parse Error: ${e.message}`);
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span><span>Sending…</span>';
        setStatus('loading', 'EJB サービスを呼び出し中…');
        if (respHttpStatus) respHttpStatus.textContent = '';
        if (respTime) respTime.textContent = '';

        addLog(tab, 'req', `[SEND] POST /api/process`);
        addLog(tab, 'req', `[SEND] Body: ${JSON.stringify(body).substring(0, 200)}`);

        tab._timestamp = new Date().toLocaleString('ja-JP');
        const t0 = performance.now();

        try {
            const res     = await fetch('/api/process', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body:    JSON.stringify(body)
            });
            const elapsed = Math.round(performance.now() - t0);
            const text    = await res.text();

            let parsed;
            try { parsed = JSON.parse(text); } catch { parsed = null; }

            /* レスポンスJSON表示 */
            if (parsed && parsed.responseJson !== undefined) {
                const resJson = JSON.stringify(parsed.responseJson, null, 2);
                if (tab.outputEditor) tab.outputEditor.setValue(resJson);

                // Response JSON lines 更新
                const resLinesEl = document.getElementById('resLines-' + tab.id);
                if (resLinesEl) resLinesEl.textContent = resJson.split('\n').length + ' lines';

                /* RequestDto toString */
                const reqTsContent = document.getElementById('reqTsContent-' + tab.id);
                if (reqTsContent) {
                    reqTsContent.innerHTML = renderLinedText(parsed.requestToString || '');
                    updateSubTabMeta(tab.id, 'req', 'tostring', parsed.requestToString || '');
                }
                tab._requestToString = parsed.requestToString || '';

                /* ResponseDto toString */
                const resTosContent = document.getElementById('resTosContent-' + tab.id);
                if (resTosContent) {
                    resTosContent.innerHTML = renderLinedText(parsed.responseToString || '');
                    updateSubTabMeta(tab.id, 'res', 'tostring', parsed.responseToString || '');
                }
                tab._responseToString = parsed.responseToString || '';
            } else {
                const fallback = parsed ? JSON.stringify(parsed, null, 2) : text;
                if (tab.outputEditor) tab.outputEditor.setValue(fallback);
            }

            if (respTime) respTime.textContent = elapsed + ' ms';
            tab._httpStatus = res.status;
            tab._httpStatusText = res.statusText;
            tab._respTime = elapsed;

            if (res.ok) {
                setStatus('success', `HTTP ${res.status} ${res.statusText}  —  ${elapsed} ms`);
                if (respHttpStatus) {
                    respHttpStatus.textContent = 'HTTP ' + res.status;
                    respHttpStatus.style.color = 'var(--c-ok)';
                }
                addLog(tab, 'res', `[RESPONSE] HTTP ${res.status} ${res.statusText} — ${elapsed} ms`);
            } else {
                setStatus('error', `HTTP ${res.status} ${res.statusText}  —  ${elapsed} ms`);
                if (respHttpStatus) {
                    respHttpStatus.textContent = 'HTTP ' + res.status;
                    respHttpStatus.style.color = 'var(--c-err)';
                }
                addLog(tab, 'res', `[ERROR] HTTP ${res.status} ${res.statusText} — ${elapsed} ms`);
            }

        } catch (e) {
            const elapsed = Math.round(performance.now() - t0);
            setStatus('error', 'Network Error: ' + e.message);
            if (tab.outputEditor) {
                tab.outputEditor.setValue(JSON.stringify({ error: 'Network Error', message: e.message }, null, 2));
            }
            if (respHttpStatus) {
                respHttpStatus.textContent = 'Error';
                respHttpStatus.style.color = 'var(--c-err)';
            }
            if (respTime) respTime.textContent = elapsed + ' ms';
            addLog(tab, 'res', `[ERROR] Network Error: ${e.message} — ${elapsed} ms`);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<span>&#9654;</span><span>Send</span>';
        }
    }

    /* ── ログ管理 ─────────────────────────────── */
    function addLog(tab, side, message) {
        const now = new Date();
        const ts = now.toLocaleTimeString('ja-JP', { hour12: false }) +
                   '.' + String(now.getMilliseconds()).padStart(3, '0');
        const entry = `[${ts}] ${message}`;

        if (!tab._logs) tab._logs = { req: [], res: [] };
        tab._logs[side].push(entry);

        // ログ表示更新
        const logContent = document.getElementById(`${side === 'req' ? 'req' : 'res'}LogContent-${tab.id}`);
        if (logContent) {
            const allLogs = tab._logs[side].join('\n');
            logContent.innerHTML = renderLinedText(allLogs, 'log-content');
        }

        // ログ件数更新
        const countEl = document.getElementById(`${side === 'req' ? 'req' : 'res'}LogCount-${tab.id}`);
        if (countEl) countEl.textContent = tab._logs[side].length + ' entries';
    }

    /* ── サブタブメタ情報更新 ─────────────────── */
    function updateSubTabMeta(tabId, side, sub, text) {
        if (sub === 'tostring') {
            const lines = text ? text.split('\n').length : 0;
            const elId = side === 'req' ? `reqTsLines-${tabId}` : `resTosLines-${tabId}`;
            const el = document.getElementById(elId);
            if (el) el.textContent = lines + ' lines';
        }
    }

    /* ── クリア ───────────────────────────────── */
    function clearActiveTab() {
        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab) return;

        // Request エディターをデフォルトに戻す
        if (tab.inputEditor) {
            tab.inputEditor.setValue(JSON.stringify({
                operationType: "getCustomer",
                data: {
                    customerId:    "C001",
                    includeOrders: true
                }
            }, null, 2));
        }

        // Response エディターをクリア
        if (tab.outputEditor) {
            tab.outputEditor.setValue('// Send ボタンを押してください (Ctrl+Enter)');
        }

        // toString クリア
        const reqTs = document.getElementById('reqTsContent-' + tab.id);
        if (reqTs) reqTs.innerHTML = renderLinedText('// DTO to JSON または Send を実行してください');

        const resTs = document.getElementById('resTosContent-' + tab.id);
        if (resTs) resTs.innerHTML = renderLinedText('// Send を実行してください');

        // ログクリア
        if (tab._logs) tab._logs = { req: [], res: [] };
        const reqLog = document.getElementById('reqLogContent-' + tab.id);
        if (reqLog) reqLog.innerHTML = renderLinedText('// ログなし', 'log-content');
        const resLog = document.getElementById('resLogContent-' + tab.id);
        if (resLog) resLog.innerHTML = renderLinedText('// ログなし', 'log-content');

        // メタ情報リセット
        ['reqLines', 'reqBytes', 'resLines', 'reqTsLines', 'resTosLines',
         'reqLogCount', 'resLogCount', 'respHttpStatus', 'respTime'].forEach(key => {
            const el = document.getElementById(key + '-' + tab.id);
            if (el) el.textContent = '';
        });

        setStatus('', 'クリアしました');
    }

    /* ── タブ選択トグル ───────────────────────── */
    function toggleTabSelect(id, event) {
        event.stopPropagation();
        const tab = tabs.find(t => t.id === id);
        if (tab) tab.selected = event.target.checked;
    }

    /* ── タブ名リネーム ───────────────────────── */
    function startRenameTab(id, event) {
        event.stopPropagation();
        const tab = tabs.find(t => t.id === id);
        if (!tab) return;
        const span = event.currentTarget;
        const currentLabel = tab.label || `#${tab.number} ${tab.dtoName}`;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'tab-rename-input';
        input.value = currentLabel;
        span.replaceWith(input);
        input.focus();
        input.select();
        const finish = () => {
            const val = input.value.trim();
            tab.label = val || null;
            renderTabs();
        };
        input.onblur = finish;
        input.onkeydown = e => {
            if (e.key === 'Enter')  { input.blur(); }
            if (e.key === 'Escape') { input.value = currentLabel; input.blur(); }
            e.stopPropagation();
        };
    }

    /* ── タブコピー ───────────────────────────── */
    function copyTab(id, event) {
        event.stopPropagation();
        const src = tabs.find(t => t.id === id);
        if (!src) return;
        tabCounter++;
        const newId = 'tab-' + tabCounter;
        const newTab = {
            id: newId,
            number: tabCounter,
            dtoName: src.dtoName,
            label: src.label ? src.label + ' (コピー)' : null,
            memo: src.memo || '',
            inputEditor: null,
            outputEditor: null,
            logs: [],
            reqSubTab: 'json',
            resSubTab: 'json',
            selected: src.selected,
            _copyReqJson:        src.inputEditor  ? src.inputEditor.getValue()  : '',
            _copyResJson:        src.outputEditor ? src.outputEditor.getValue() : '',
            _requestToString:    src._requestToString  || '',
            _responseToString:   src._responseToString || '',
            _httpStatus:         src._httpStatus     || '',
            _httpStatusText:     src._httpStatusText  || '',
            _respTime:           src._respTime != null ? src._respTime : null,
            _timestamp:          src._timestamp || '',
            _logs:               src._logs ? { req: [...src._logs.req], res: [...src._logs.res] } : null,
        };
        const srcIdx = tabs.findIndex(t => t.id === id);
        tabs.splice(srcIdx + 1, 0, newTab);
        renderTabs();
        switchTab(newId);
    }

    /* ── タブ ドラッグ並べ替え ───────────────── */
    let _dragSrcTabId = null;

    function onTabDragStart(e) {
        _dragSrcTabId = e.currentTarget.dataset.tabId;
        e.currentTarget.classList.add('tab-dragging');
        e.dataTransfer.effectAllowed = 'move';
    }
    function onTabDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (e.currentTarget.dataset.tabId !== _dragSrcTabId)
            e.currentTarget.classList.add('tab-drag-over');
    }
    function onTabDragLeave(e) {
        e.currentTarget.classList.remove('tab-drag-over');
    }
    function onTabDrop(e) {
        e.preventDefault();
        const targetId = e.currentTarget.dataset.tabId;
        e.currentTarget.classList.remove('tab-drag-over');
        if (!_dragSrcTabId || _dragSrcTabId === targetId) return;
        const srcIdx = tabs.findIndex(t => t.id === _dragSrcTabId);
        const tgtIdx = tabs.findIndex(t => t.id === targetId);
        tabs.splice(tgtIdx, 0, tabs.splice(srcIdx, 1)[0]);
        renderTabs();
    }
    function onTabDragEnd(e) {
        e.currentTarget.classList.remove('tab-dragging');
        document.querySelectorAll('.req-tab').forEach(el => el.classList.remove('tab-drag-over'));
        _dragSrcTabId = null;
    }

    /* ── タブメモ保存 ─────────────────────────── */
    function saveTabMemo(id, value) {
        const tab = tabs.find(t => t.id === id);
        if (tab) tab.memo = value;
    }

    /* ── 抽出リスト ───────────────────────────── */
    let extractionRows = [];   // [{key:'', value:''}]
    let extractionVisible = false;

    function toggleExtractionPanel() {
        extractionVisible = !extractionVisible;
        document.getElementById('extractionPanel').style.display = extractionVisible ? 'block' : 'none';
        const arrow = document.getElementById('extractionToggleArrow');
        arrow.classList.toggle('open', extractionVisible);
        if (extractionVisible && extractionRows.length === 0) {
            addExtractionRow();
        }
    }

    function addExtractionRow(key, value) {
        extractionRows.push({ key: key || '', value: value || '' });
        renderExtractionRows();
    }

    function removeExtractionRow(idx) {
        extractionRows.splice(idx, 1);
        renderExtractionRows();
    }

    function saveExtractionKey(idx, v)   { extractionRows[idx].key   = v; }
    function saveExtractionValue(idx, v) { extractionRows[idx].value = v; }

    function renderExtractionRows() {
        const tbody = document.getElementById('extractionRows');
        tbody.innerHTML = '';
        extractionRows.forEach((row, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="ex-td">
                    <input class="ex-input-key" type="text" value="${escHtml(row.key)}"
                           placeholder="フィールド名（例: event）"
                           oninput="saveExtractionKey(${idx}, this.value)"
                           onkeydown="if(event.key==='Enter') extractField(${idx})">
                </td>
                <td class="ex-td">
                    <input class="ex-input-val" type="text" value="${escHtml(row.value)}"
                           placeholder="（抽出ボタンで自動入力、手動入力も可）"
                           oninput="saveExtractionValue(${idx}, this.value)">
                </td>
                <td class="ex-td">
                    <div class="ex-actions">
                        <button class="btn-ex-extract" onclick="extractField(${idx})" title="アクティブタブのJSONから抽出">抽出</button>
                        <button class="btn-ex-del"     onclick="removeExtractionRow(${idx})" title="削除">&times;</button>
                    </div>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    /* JSON から指定キーの値を取り出す（ドット記法対応・配列はカンマ結合） */
    function extractFromJson(jsonStr, fieldKey) {
        let obj;
        try { obj = JSON.parse(jsonStr); } catch { return null; }
        if (!obj || typeof obj !== 'object') return null;

        // ドット区切りパス解決
        const parts = fieldKey.split('.');
        let cur = obj;
        for (const p of parts) {
            if (cur === null || cur === undefined) return null;
            if (Array.isArray(cur)) {
                // 配列の各要素からキーを取り出す
                const vals = cur.map(el => (el && typeof el === 'object') ? el[p] : undefined)
                               .filter(v => v !== undefined);
                cur = vals.length === 1 ? vals[0] : vals;
            } else {
                cur = cur[p];
            }
        }
        if (cur === undefined || cur === null) return null;
        if (Array.isArray(cur)) return cur.map(v => flattenValue(v)).join(', ');
        return flattenValue(cur);
    }

    function flattenValue(v) {
        if (v === null || v === undefined) return '';
        if (typeof v === 'object') return JSON.stringify(v);
        return String(v);
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function extractField(idx) {
        const row = extractionRows[idx];
        if (!row || !row.key.trim()) return;
        const tab = tabs.find(t => t.id === activeTabId);
        if (!tab) return;

        const reqJson = tab.inputEditor  ? tab.inputEditor.getValue()  : '';
        const resJson = tab.outputEditor ? tab.outputEditor.getValue() : '';

        let found = extractFromJson(reqJson, row.key.trim());
        if (found === null) found = extractFromJson(resJson, row.key.trim());

        if (found !== null) {
            row.value = found;
        } else {
            row.value = '(見つかりません)';
        }
        renderExtractionRows();
    }

    /* ── テストエビデンス出力 ─────────────────── */
    function exportEvidence() {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
        const timeStr = `${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
        const displayTime = `${dateStr} ${timeStr.replace(/-/g, ':')}`;

        const selectedTabs = tabs.filter(t => t.selected !== false);
        if (selectedTabs.length === 0) {
            setStatus('error', 'エビデンス出力対象のタブが選択されていません');
            return;
        }

        const evidenceTitle   = document.getElementById('evidenceTitle').value.trim() || 'テストエビデンス';
        const evidenceComment = document.getElementById('evidenceComment').value.trim();
        const dtoNames = selectedTabs.map(t => t.dtoName.replace(/[\\/:*?"<>|]/g, '-')).join('_');
        const fileName = `${evidenceTitle.replace(/[\\/:*?"<>|]/g, '-')}_${dtoNames}_${dateStr}_${timeStr}.html`;

        const e = s => String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

        const cases = selectedTabs.map(tab => {
            const reqJson        = tab.inputEditor  ? tab.inputEditor.getValue()  : '';
            const resJson        = tab.outputEditor ? tab.outputEditor.getValue() : '';
            const reqToString    = tab._requestToString  || '';
            const resToString    = tab._responseToString || '';
            const httpStatus     = tab._httpStatus     || '';
            const httpStatusText = tab._httpStatusText || '';
            const respTime       = tab._respTime != null ? tab._respTime + ' ms' : '';
            const timestamp      = tab._timestamp || '(未実行)';
            const reqLogs        = (tab._logs && tab._logs.req.length) ? tab._logs.req.join('\n') : '';
            const resLogs        = (tab._logs && tab._logs.res.length) ? tab._logs.res.join('\n') : '';
            const tabMemo        = tab.memo || '';
            const tabDisplayName = tab.label || `#${tab.number} ${tab.dtoName}`;
            const statusClass    = httpStatus >= 200 && httpStatus < 300 ? 'status-ok'
                                 : httpStatus ? 'status-err' : 'status-none';

            const memoBlock = tabMemo
                ? `<details open><summary>メモ</summary><pre class="memo-pre">${e(tabMemo)}</pre></details>`
                : '';
            const reqTsBlock = reqToString
                ? `<details open><summary>Request toString</summary><pre>${e(reqToString)}</pre></details>`
                : '';
            const resTosBlock = resToString
                ? `<details open><summary>Response toString</summary><pre>${e(resToString)}</pre></details>`
                : '';
            const reqLogBlock = reqLogs
                ? `<details open><summary>Request Log</summary><div class="log-area">${e(reqLogs)}</div></details>`
                : '';
            const resLogBlock = resLogs
                ? `<details open><summary>Response Log</summary><div class="log-area">${e(resLogs)}</div></details>`
                : '';

            return `
<div class="test-case">
  <div class="test-case-header">
    <span>${e(tabDisplayName)}</span>
    <span style="font-weight:normal;font-size:11px;">実行: ${e(timestamp)}</span>
  </div>
  <div class="test-case-body">
    <div class="status-row">
      <div class="status-item">
        <span class="status-label">HTTP Status:</span>
        <span class="${statusClass}">${httpStatus ? e(httpStatus + ' ' + httpStatusText) : '(未実行)'}</span>
      </div>
      <div class="status-item">
        <span class="status-label">応答時間:</span>
        <span>${e(respTime || '-')}</span>
      </div>
    </div>
    <details open><summary>Request JSON</summary><pre>${e(reqJson)}</pre></details>
    <details open><summary>Response JSON</summary><pre>${e(resJson)}</pre></details>
    ${reqTsBlock}
    ${resTosBlock}
    ${memoBlock}
    ${reqLogBlock}
    ${resLogBlock}
  </div>
</div>`;
        }).join('\n');

        const html = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>${e(evidenceTitle)} ${displayTime}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','Meiryo',sans-serif; margin:24px; color:#1e1e1e; background:#fff; font-size:13px; }
h1 { font-size:20px; border-bottom:3px solid #007acc; padding-bottom:10px; margin-bottom:6px; color:#007acc; }
.meta { font-size:12px; color:#666; margin-bottom:8px; }
.global-comment { font-size:12px; color:#444; background:#f9f9f9; border-left:3px solid #007acc; padding:6px 12px; margin-bottom:20px; white-space:pre-wrap; }
.memo-pre { background:#fffde7; border:1px solid #f0e68c; padding:8px 12px; font-size:11px; font-family:Consolas,'Courier New',monospace; line-height:1.6; border-radius:3px; white-space:pre-wrap; word-break:break-all; margin-top:4px; }
.test-case { border:1px solid #ccc; margin-bottom:20px; border-radius:4px; }
.test-case-header { background:#007acc; color:#fff; padding:8px 14px; font-weight:bold; font-size:13px; display:flex; justify-content:space-between; align-items:center; border-radius:3px 3px 0 0; }
.test-case-body { padding:14px; }
.status-row { display:flex; gap:28px; margin-bottom:10px; font-size:12px; }
.status-item { display:flex; align-items:center; gap:6px; }
.status-label { color:#888; }
.status-ok { color:#2e7d32; font-weight:bold; }
.status-err { color:#c62828; font-weight:bold; }
.status-none { color:#999; }
details { margin-top:8px; }
details:first-of-type { margin-top:0; }
summary { font-size:10px; font-weight:bold; color:#555; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; padding:4px 0; user-select:none; }
summary:hover { color:#007acc; }
pre { background:#f5f5f5; border:1px solid #ddd; padding:10px 12px; font-size:11px; font-family:Consolas,'Courier New',monospace; line-height:1.6; overflow:auto; border-radius:3px; white-space:pre-wrap; word-break:break-all; max-height:320px; margin-top:4px; }
.log-area { background:#1e1e1e; color:#d4d4d4; padding:8px 12px; font-size:10px; font-family:Consolas,monospace; line-height:1.5; max-height:160px; overflow:auto; border-radius:3px; white-space:pre-wrap; word-break:break-all; margin-top:4px; }
@media print {
  body { margin:10px; }
  .test-case { page-break-inside:avoid; }
  details { open:true; }
  pre { max-height:none !important; }
  .log-area { max-height:none !important; }
}
</style>
</head>
<body>
<h1>&#128196; ${e(evidenceTitle)}</h1>
<div class="meta">出力日時: ${displayTime}&nbsp;&nbsp;|&nbsp;&nbsp;テストケース数: ${selectedTabs.length} 件</div>
${evidenceComment ? `<div class="global-comment">${e(evidenceComment)}</div>` : ''}
${cases}
</body>
</html>`;

        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
        setStatus('success', `エビデンス出力完了: ${fileName}`);
    }

    /* ── ユーティリティ ───────────────────────── */
    function setStatus(type, msg) {
        const bar = document.getElementById('statusBar');
        bar.className = 'status-bar';
        if (!msg) { bar.textContent = '✓ Ready'; return; }
        bar.textContent = msg;
        if (type === 'error')   bar.classList.add('s-error');
        if (type === 'success') bar.classList.add('s-success');
        if (type === 'loading') bar.classList.add('s-loading');
    }

    function fmtBytes(b) {
        return b < 1024 ? b + ' B' : (b / 1024).toFixed(1) + ' KB';
    }

    /* ブラウザ全体の Ctrl+Enter */
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            sendRequestFromActiveTab();
        }
    });

    /* ── 初期タブ作成 ────────────────────────── */
    addNewTab('Default');
</script>
</body>
</html>
